name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  lint-build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'
      
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            debhelper-compat \
            python3-setuptools \
            python3-setuptools-scm \
            gettext
          pip install flake8 pylint
      
      - name: Lint with flake8
        run: |
          # Stop build on syntax errors
          flake8 src/linux_hello --count --select=E9,F63,F7,F82 --show-source --statistics
          # Exit-zero treats all errors as warnings
          flake8 src/linux_hello --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
      
      - name: Build package (CI mode)
        run: |
          cd $GITHUB_WORKSPACE
          export SETUPTOOLS_SCM_PRETEND_VERSION=$(git describe --tags --always)
          dpkg-buildpackage -us -uc
      
      - name: Verify package
        run: |
          PACKAGE=$(ls ../linux-hello_*.deb | head -1)
          echo "Package: $PACKAGE"
          dpkg -I $PACKAGE | head -10
